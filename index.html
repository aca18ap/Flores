<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flores — Coming Soon</title>
<meta name="description" content="Flores — A pop funk album. Coming soon.">
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #F2E8CC;
    --yellow: #D4A937;
    --yellow-light: #E8D27A;
    --yellow-soft: #DCC56A;
    --mustard: #B89230;
    --brown: #6B4423;
    --brown-dark: #3E2611;
    --brown-light: #8B6840;
    --brown-mid: #8B6840;
    --terracotta: #B47A3A;
    --olive: #A38940;
    --olive-light: #C9B05A;
    --sunflower-petal: #F2C12C;
    --sunflower-inner: #E89817;
    --sunflower-center: #6B3E18;
    --sunflower-core: #3A2008;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--cream);
    color: var(--brown-dark);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    opacity: 0.08;
    pointer-events: none;
    z-index: 100;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 200px;
  }

  /* Background decorative circles */
  .bg-shapes {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }

  .bg-circle {
    position: absolute;
    border-radius: 50%;
    opacity: 0.12;
  }

  .bg-circle:nth-child(1) {
    width: 600px; height: 600px;
    background: var(--yellow);
    top: -200px; right: -150px;
    animation: drift1 20s ease-in-out infinite;
  }
  .bg-circle:nth-child(2) {
    width: 400px; height: 400px;
    background: var(--olive);
    bottom: -100px; left: -100px;
    animation: drift2 25s ease-in-out infinite;
  }
  .bg-circle:nth-child(3) {
    width: 250px; height: 250px;
    background: var(--brown-light);
    top: 40%; left: 60%;
    animation: drift3 18s ease-in-out infinite;
  }

  @keyframes drift1 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(-40px, 30px) scale(1.05); }
  }
  @keyframes drift2 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(30px, -20px) scale(1.08); }
  }
  @keyframes drift3 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(-20px, -30px) scale(0.95); }
  }

  .page {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  /* Main logo / wordmark */
  .wordmark {
    text-align: center;
    margin-bottom: 1rem;
    animation: fadeUp 1.2s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  /* font-size = visible cap height of the wordmark.
     fl.png / res.png are pre-trimmed to their glyph bounds. */
  .wordmark h1 {
    font-size: clamp(4.5rem, 15vw, 9rem);
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.08em;
  }

  .letter-img {
    height: 1em;
    width: auto;
    display: block;
    flex-shrink: 0;
    filter: drop-shadow(0.04em 0.06em 0 var(--brown));
  }

  /* The flower O — diameter ≈ cap height of the letters. */
  .flower-o {
    position: relative;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 1em;
    height: 1em;
    flex-shrink: 0;
    filter: drop-shadow(0.04em 0.06em 0 var(--brown));
  }

  .flower-o svg {
    width: 100%;
    height: 100%;
    display: block;
  }

  .flower-o .petal {
    transform-origin: center;
    animation: petalSpin 30s linear infinite;
  }

  @keyframes petalSpin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .tagline {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: clamp(1rem, 2.5vw, 1.4rem);
    color: var(--brown-mid);
    letter-spacing: 0.15em;
    text-transform: lowercase;
    text-align: center;
    margin-bottom: 3rem;
    animation: fadeUp 1.2s cubic-bezier(0.22, 1, 0.36, 1) 0.2s both;
  }

  /* CTA pill — shared styles for both states */
  .cta-pill {
    display: inline-flex;
    align-items: center;
    gap: 0.6rem;
    border: 1.5px solid var(--brown);
    border-radius: 100px;
    padding: 0.7rem 1.8rem;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    font-size: clamp(0.75rem, 1.5vw, 0.9rem);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--brown);
    animation: fadeUp 1.2s cubic-bezier(0.22, 1, 0.36, 1) 0.4s both;
    position: relative;
    overflow: hidden;
    transition: background 0.4s ease, color 0.4s ease;
    text-decoration: none;
    cursor: default;
  }

  .cta-pill .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--terracotta);
    animation: pulse 2s ease-in-out infinite;
    flex-shrink: 0;
  }

  /* Pre-release: not a link */
  .cta-pill:not(a):hover {
    background: var(--brown);
    color: var(--cream);
  }

  /* Post-release: is a link */
  a.cta-pill {
    cursor: pointer;
  }
  a.cta-pill:hover {
    background: var(--brown);
    color: var(--cream);
  }
  a.cta-pill .dot {
    animation: none;
    background: var(--olive-light);
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }

  /* Countdown */
  .countdown {
    margin-top: 1.5rem;
    display: flex;
    align-items: baseline;
    gap: 0.3rem;
    animation: fadeUp 1.2s cubic-bezier(0.22, 1, 0.36, 1) 0.5s both;
  }

  .countdown-segment {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 3.2rem;
  }

  .countdown-number {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    line-height: 1;
    color: var(--brown);
    font-variant-numeric: tabular-nums;
  }

  .countdown-label {
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    font-size: 0.6rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--brown-mid);
    margin-top: 0.25rem;
  }

  .countdown-sep {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.4rem, 3.5vw, 2rem);
    color: var(--brown-mid);
    opacity: 0.4;
    padding: 0 0.15rem;
    align-self: flex-start;
    line-height: 1;
  }

  /* Buttons row */
  .actions {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  /* Reminder button */
  .reminder-wrap {
    position: relative;
    margin-top: 1rem;
    animation: fadeUp 1.2s cubic-bezier(0.22, 1, 0.36, 1) 0.55s both;
  }

  .reminder-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    background: none;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-weight: 400;
    font-size: clamp(0.75rem, 1.3vw, 0.85rem);
    letter-spacing: 0.08em;
    color: var(--brown-mid);
    cursor: pointer;
    padding: 0.5rem 0.8rem;
    border-radius: 6px;
    transition: color 0.3s ease, background 0.3s ease;
  }

  .reminder-btn:hover {
    color: var(--brown);
    background: rgba(61, 43, 31, 0.05);
  }

  .reminder-btn svg {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
  }

  /* Calendar popover */
  .cal-popover {
    position: absolute;
    bottom: calc(100% + 0.6rem);
    left: 50%;
    transform: translateX(-50%) translateY(6px);
    background: var(--cream);
    border: 1.5px solid var(--brown);
    border-radius: 12px;
    padding: 0.8rem;
    display: flex;
    flex-direction: column;
    gap: 0.2rem;
    min-width: 200px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease, transform 0.25s ease;
    box-shadow: 0 8px 30px rgba(61, 43, 31, 0.12);
    z-index: 10;
  }

  .cal-popover.open {
    opacity: 1;
    pointer-events: auto;
    transform: translateX(-50%) translateY(0);
  }

  /* Little arrow at bottom of popover */
  .cal-popover::after {
    content: '';
    position: absolute;
    bottom: -7px;
    left: 50%;
    transform: translateX(-50%) rotate(45deg);
    width: 12px;
    height: 12px;
    background: var(--cream);
    border-right: 1.5px solid var(--brown);
    border-bottom: 1.5px solid var(--brown);
  }

  .cal-popover a {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.55rem 0.7rem;
    border-radius: 8px;
    text-decoration: none;
    font-family: 'DM Sans', sans-serif;
    font-weight: 400;
    font-size: 0.82rem;
    color: var(--brown);
    letter-spacing: 0.02em;
    transition: background 0.2s ease;
  }

  .cal-popover a:hover {
    background: rgba(61, 43, 31, 0.07);
  }

  .cal-popover a svg {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
  }

  .cal-popover .cal-label-sub {
    font-size: 0.68rem;
    color: var(--brown-mid);
    letter-spacing: 0.04em;
    margin-left: auto;
  }

  /* Decorative divider */
  .divider {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin: 2.5rem 0;
    animation: fadeUp 1.2s cubic-bezier(0.22, 1, 0.36, 1) 0.6s both;
  }

  .divider-line {
    width: 40px;
    height: 1px;
    background: var(--brown-mid);
    opacity: 0.4;
  }

  .divider-flower {
    width: 14px;
    height: 14px;
    opacity: 0.5;
  }

  /* Email / social section */
  .contact {
    text-align: center;
    animation: fadeUp 1.2s cubic-bezier(0.22, 1, 0.36, 1) 0.7s both;
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
    justify-content: center;
  }

  .contact a {
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    font-size: clamp(0.85rem, 1.5vw, 1rem);
    color: var(--brown-light);
    text-decoration: none;
    letter-spacing: 0.08em;
    border-bottom: 1px solid transparent;
    transition: border-color 0.3s ease, color 0.3s ease;
    padding-bottom: 2px;
  }

  .contact a:hover {
    color: var(--brown);
    border-bottom-color: var(--terracotta);
  }

  /* Footer */
  .footer {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 1.2rem 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 2;
    animation: fadeUp 1.2s cubic-bezier(0.22, 1, 0.36, 1) 0.9s both;
  }

  .footer-text {
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    font-size: 0.7rem;
    color: var(--brown-mid);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    opacity: 0.6;
  }

  /* Scattered flowers */
  .scatter-flower {
    position: fixed;
    pointer-events: none;
    z-index: 0;
    opacity: 0.35;
  }

  .scatter-flower:nth-child(1) { top: 15%; left: 8%; width: 30px; animation: bob 6s ease-in-out infinite; }
  .scatter-flower:nth-child(2) { top: 70%; right: 12%; width: 22px; animation: bob 8s ease-in-out 1s infinite; }
  .scatter-flower:nth-child(3) { bottom: 20%; left: 15%; width: 18px; animation: bob 7s ease-in-out 2s infinite; }
  .scatter-flower:nth-child(4) { top: 25%; right: 20%; width: 24px; animation: bob 9s ease-in-out 0.5s infinite; }

  @keyframes bob {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-8px) rotate(10deg); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Responsive */
  @media (max-width: 600px) {
    .footer {
      flex-direction: column;
      gap: 0.3rem;
      padding: 1rem;
    }
    .page {
      padding: 2rem 1.5rem 5rem;
    }
    .cal-popover {
      min-width: 180px;
    }
  }
</style>
</head>

    <a href="mailto:info@floresmusic.co.uk">info@floresmusic.co.uk</a>
    <a href="tel:+447539076493">+44 7539 076 493</a>
  </div>
</div>

<div class="footer">
  <span class="footer-text">Flores • 2026</span>
  <span class="footer-text">floresmusic.co.uk</span>
</div>

<script>
(function () {
  // ── CONFIG ──────────────────────────────────────────────
  const RELEASE_DATE = new Date('2026-06-01T00:00:00');
  const BANDCAMP_URL = 'https://floresmusic1.bandcamp.com/album/Flores'; // ← update when live
  const EVENT_TITLE  = 'Flores - Album Out Now 🌸';
  const EVENT_DESC   = 'The Flores debut album is out! Listen now: ' + BANDCAMP_URL;
  const EVENT_LOCATION = BANDCAMP_URL;
  // ───────────────────────────────────────────────────────

  const ctaContainer  = document.getElementById('cta-container');
  const countdownEl   = document.getElementById('countdown');
  const reminderWrap  = document.getElementById('reminder-wrap');
  const reminderBtn   = document.getElementById('reminder-btn');
  const calPopover    = document.getElementById('cal-popover');
  const gcalLink      = document.getElementById('gcal-link');
  const icsLink       = document.getElementById('ics-link');

  // ── Release state ──
  function isReleased() {
    return new Date() >= RELEASE_DATE;
  }

  // ── CTA pill ──
  function renderCTA() {
    if (isReleased()) {
      ctaContainer.innerHTML =
        '<a class="cta-pill" href="' + BANDCAMP_URL + '" target="_blank" rel="noopener">' +
          '<span class="dot"></span>' +
          '<span>Listen Now</span>' +
        '</a>';
      countdownEl.style.display = 'none';
      reminderWrap.style.display = 'none';
      document.title = 'Flores — Out Now';
    } else {
      ctaContainer.innerHTML =
        '<div class="cta-pill">' +
          '<span>Coming soon</span>' +
        '</div>';
    }
  }

  // ── Countdown ──
  function updateCountdown() {
    if (isReleased()) { countdownEl.style.display = 'none'; return; }

    const now  = new Date();
    const diff = RELEASE_DATE - now;
    const d = Math.floor(diff / 86400000);
    const h = Math.floor((diff % 86400000) / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);

    countdownEl.innerHTML =
      seg(d, 'days') + sep() +
      seg(pad(h), 'hrs')  + sep() +
      seg(pad(m), 'min')  + sep() +
      seg(pad(s), 'sec');
  }

  function seg(val, label) {
    return '<div class="countdown-segment">' +
             '<span class="countdown-number">' + val + '</span>' +
             '<span class="countdown-label">' + label + '</span>' +
           '</div>';
  }
  function sep() {
    return '<span class="countdown-sep">:</span>';
  }
  function pad(n) { return n < 10 ? '0' + n : n; }

  // ── Calendar reminder ──
  // Google Calendar link
  function buildGcalUrl() {
    var start = '20260601';
    var end   = '20260602';
    return 'https://calendar.google.com/calendar/render?action=TEMPLATE' +
      '&text='     + encodeURIComponent(EVENT_TITLE) +
      '&dates='    + start + '/' + end +
      '&details='  + encodeURIComponent(EVENT_DESC) +
      '&location=' + encodeURIComponent(EVENT_LOCATION);
  }
  gcalLink.href = buildGcalUrl();

  // .ics file (Apple Calendar, Outlook, etc.)
  function buildIcs() {
    var lines = [
      'BEGIN:VCALENDAR',
      'VERSION:2.0',
      'PRODID:-//Flores//Release//EN',
      'BEGIN:VEVENT',
      'DTSTART;VALUE=DATE:20260601',
      'DTEND;VALUE=DATE:20260602',
      'SUMMARY:' + EVENT_TITLE,
      'DESCRIPTION:' + EVENT_DESC,
      'URL:' + BANDCAMP_URL,
      'BEGIN:VALARM',
      'TRIGGER:-PT0M',
      'ACTION:DISPLAY',
      'DESCRIPTION:' + EVENT_TITLE,
      'END:VALARM',
      'END:VEVENT',
      'END:VCALENDAR'
    ];
    return lines.join('\r\n');
  }

  var icsBlob = new Blob([buildIcs()], { type: 'text/calendar;charset=utf-8' });
  icsLink.href = URL.createObjectURL(icsBlob);

  // Popover toggle
  reminderBtn.addEventListener('click', function (e) {
    e.stopPropagation();
    calPopover.classList.toggle('open');
  });

  document.addEventListener('click', function (e) {
    if (!reminderWrap.contains(e.target)) {
      calPopover.classList.remove('open');
    }
  });

  // ── Init ──
  renderCTA();
  updateCountdown();
  setInterval(updateCountdown, 1000);

  // Re-check release state every minute (in case someone leaves the tab open)
  setInterval(function () {
    if (isReleased()) renderCTA();
  }, 60000);
})();
</script>

</body>
